[versions]
agp              = "8.5.2"
kotlin           = "2.0.21"
ksp              = "2.0.21-1.0.27"
hilt             = "2.52"
compose-bom      = "2024.10.01"
media3           = "1.4.1"
room             = "2.6.1"
retrofit         = "2.11.0"
okhttp           = "4.12.0"
coil             = "2.7.0"
coroutines       = "1.9.0"
lifecycle        = "2.8.7"
navigation       = "2.8.4"
work             = "2.9.1"
datastore        = "1.1.1"
gson             = "2.10.1"
moshi            = "1.15.1"
material         = "1.12.0"

[libraries]
androidx-core-ktx                  = { group = "androidx.core",              name = "core-ktx",                      version = "1.15.0" }
