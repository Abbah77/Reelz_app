okhttp-logging                     = { group = "com.squareup.okhttp3",       name = "logging-interceptor",           version.ref = "okhttp" }
coil-compose                       = { group = "io.coil-kt",                 name = "coil-compose",                  version.ref = "coil" }
coil-video                         = { group = "io.coil-kt",                 name = "coil-video",                    version.ref = "coil" }
coroutines-android                 = { group = "org.jetbrains.kotlinx",      name = "kotlinx-coroutines-android",    version.ref = "coroutines" }
datastore                          = { group = "androidx.datastore",         name = "datastore-preferences",         version.ref = "datastore" }
palette                            = { group = "androidx.palette",           name = "palette-ktx",                   version = "1.0.0" }
gson                               = { group = "com.google.code.gson",       name = "gson",                          version.ref = "gson" }
google-auth                        = { group = "com.google.android.gms",     name = "play-services-auth",            version = "21.2.0" }
credentials                        = { group = "androidx.credentials",       name = "credentials",                   version = "1.3.0" }
credentials-play                   = { group = "androidx.credentials",       name = "credentials-play-services-auth",version = "1.3.0" }
googleid                           = { group = "com.google.android.libraries.identity.googleid", name = "googleid", version = "1.1.1" }
accompanist-permissions            = { group = "com.google.accompanist",     name = "accompanist-permissions",       version = "0.36.0" }

[plugins]
android-application   = { id = "com.android.application",         version.ref = "agp" }
kotlin-android        = { id = "org.jetbrains.kotlin.android",    version.ref = "kotlin" }
kotlin-compose        = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
ksp                   = { id = "com.google.devtools.ksp",         version.ref = "ksp" }
hilt                  = { id = "com.google.dagger.hilt.android",  version.ref = "hilt" }
